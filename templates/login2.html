<!DOCTYPE html>
<html lang="en" data-theme="dark">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Grad Social 2026 — Login</title>
  <link href="https://fonts.googleapis.com/css2?family=Akshar:wght@300;400;500;600;700&display=swap" rel="stylesheet" />
  <style>
    :root {
      --primary: #0d6efd;
      --success: #198754;
      --info: #0dcaf0;
      --warning: #ffc107;
      --danger: #dc3545;
      --accent-glow: #0d6efd33;
    }

    [data-theme="dark"] {
      --bg: transparent;
      --surface: rgba(8, 20, 49, 0.78);
      --surface2: rgba(12, 31, 72, 0.82);
      --border: rgba(255, 255, 255, 0.34);
      --border-faint: rgba(255, 255, 255, 0.2);
      --text: #f7fbff;
      --muted: rgba(229, 242, 255, 0.72);
      --muted-light: rgba(243, 249, 255, 0.9);
      --input-bg: rgba(255, 255, 255, 0.12);
      --shadow: 0 24px 62px #0014378c;
      --header-bg: rgba(5, 16, 43, 0.42);
      --header-border: rgba(255, 255, 255, 0.26);
      --header-text: rgba(255, 255, 255, 0.95);
      --control-bg: rgba(255, 255, 255, 0.13);
      --control-border: rgba(255, 255, 255, 0.35);
      --control-text: rgba(255, 255, 255, 0.92);
      --control-hover: #ffffff;
      --overlay-top: rgba(10, 26, 63, 0.58);
      --overlay-bottom: rgba(11, 18, 39, 0.36);
      --overlay-glow: #4ea0ff3b;
    }

    [data-theme="light"] {
      --bg: transparent;
      --surface: rgba(255, 255, 255, 0.9);
      --surface2: rgba(247, 251, 255, 0.94);
      --border: rgba(34, 66, 128, 0.24);
      --border-faint: rgba(34, 66, 128, 0.14);
      --text: #1f3264;
      --muted: #445d92;
      --muted-light: #2a4279;
      --input-bg: rgba(255, 255, 255, 0.92);
      --shadow: 0 20px 52px #0f2b6026;
      --header-bg: rgba(255, 255, 255, 0.7);
      --header-border: rgba(35, 66, 128, 0.22);
      --header-text: #1f3264;
      --control-bg: rgba(255, 255, 255, 0.78);
      --control-border: rgba(35, 66, 128, 0.28);
      --control-text: #1f3264;
      --control-hover: #15316b;
      --overlay-top: rgba(244, 248, 255, 0.46);
      --overlay-bottom: rgba(219, 232, 255, 0.2);
      --overlay-glow: #74a7ff2b;
    }

    * { box-sizing: border-box; margin: 0; padding: 0; }

    body {
      min-height: 100vh;
      font-family: 'Akshar', sans-serif;
      background: var(--bg);
      background-image: url('/assets/img/HomeBackground.png');
      background-size: cover;
      background-position: top;
      background-attachment: fixed;
      color: var(--text);
      transition: background 0.25s, color 0.25s;
    }

    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background:
        linear-gradient(180deg, var(--overlay-top), var(--overlay-bottom)),
        radial-gradient(ellipse at 10% 8%, var(--overlay-glow) 0%, transparent 58%);
      pointer-events: none;
      z-index: 0;
    }

    header {
      position: relative;
      z-index: 10;
      padding: 0.85rem 2rem;
      display: flex;
      align-items: center;
      justify-content: space-between;
      background: var(--header-bg);
      backdrop-filter: blur(8px);
      -webkit-backdrop-filter: blur(8px);
      border-bottom: 1px solid var(--header-border);
    }

    .logo {
      font-family: 'Akshar', sans-serif;
      font-size: 1.45rem;
      color: var(--header-text);
      text-decoration: none;
      letter-spacing: 0.04em;
    }
    .logo span { color: var(--header-text); }

    .header-right { display: flex; align-items: center; gap: 0.85rem; }

    .theme-toggle {
      background: var(--control-bg);
      border: 1px solid var(--control-border);
      border-radius: 999px;
      padding: 0.3rem 0.5rem;
      cursor: pointer;
      font-size: 0.9rem;
      color: var(--control-text);
      transition: all 0.18s;
    }
    .theme-toggle:hover { border-color: var(--control-hover); color: var(--control-hover); }

    .nav-btn {
      color: var(--control-text);
      text-decoration: none;
      font-size: 0.82rem;
      border: 1px solid var(--control-border);
      padding: 0.34rem 0.85rem;
      border-radius: 6px;
      transition: all 0.18s;
    }
    .nav-btn:hover { color: var(--control-hover); border-color: var(--control-hover); }

    main {
      position: relative;
      z-index: 1;
      min-height: calc(100vh - 66px);
      display: grid;
      place-items: center;
      padding: 2rem 1rem;
    }

    .login-card {
      width: 100%;
      max-width: 440px;
      background: linear-gradient(155deg, #0d6efd2b, transparent 55%), var(--surface);
      border: 1px solid var(--border-faint);
      border-radius: 16px;
      box-shadow: var(--shadow);
      padding: 1.6rem 1.4rem;
      backdrop-filter: blur(10px);
      -webkit-backdrop-filter: blur(10px);
    }

    .card-title {
      font-family: 'Akshar', sans-serif;
      font-size: 1.7rem;
      margin-bottom: 0.3rem;
      color: var(--text);
      text-align: center;
    }

    .card-sub {
      text-align: center;
      color: var(--muted);
      font-size: 0.88rem;
      margin-bottom: 1.15rem;
    }

    .alert {
      margin-bottom: 0.95rem;
      border: 1px solid #842029;
      background: #2c1215;
      color: #ea868f;
      border-radius: 8px;
      padding: 0.6rem 0.75rem;
      font-size: 0.83rem;
    }
    [data-theme="light"] .alert {
      background: #f8d7da;
      border-color: #f5c2c7;
      color: #842029;
    }

    .field {
      display: flex;
      flex-direction: column;
      gap: 0.35rem;
      margin-bottom: 0.85rem;
    }

    label {
      font-size: 0.8rem;
      color: var(--muted-light);
    }

    input {
      width: 100%;
      background: var(--input-bg);
      color: var(--text);
      border: 1px solid var(--border);
      border-radius: 8px;
      padding: 0.62rem 0.75rem;
      font-size: 0.9rem;
      transition: border-color 0.18s, box-shadow 0.18s;
    }
    input:focus {
      outline: none;
      border-color: var(--primary);
      box-shadow: 0 0 0 3px var(--accent-glow);
    }

    .submit-btn {
      width: 100%;
      border: 1px solid var(--primary);
      background: var(--primary);
      color: #fff;
      border-radius: 8px;
      padding: 0.65rem 0.85rem;
      font-weight: 600;
      font-size: 0.9rem;
      cursor: pointer;
      transition: background 0.18s;
      margin-top: 0.35rem;
    }
    .submit-btn:hover { background: #0b5ed7; }

    .hint {
      margin-top: 0.95rem;
      text-align: center;
      font-size: 0.78rem;
      color: var(--muted);
    }

    @media (max-width: 680px) {
      header { padding: 0.75rem 1rem; }
      .logo { font-size: 1.2rem; }
      .login-card { padding: 1.25rem 1rem; }
    }
  </style>
</head>
<body>
  <header>
    <a class="logo" href="/">Grad Social <span>2026</span></a>
    <div class="header-right">
      <button class="theme-toggle" onclick="toggleTheme()" id="themeBtn">☀️</button>
      <a class="nav-btn" href="/">Home</a>
    </div>
  </header>

  <main>
    <section class="login-card">
      <h1 class="card-title">Welcome Back</h1>
      <p class="card-sub">Sign in to continue to Grad Social 2026.</p>

      {% if error %}
      <div class="alert" role="alert">{{ error }}</div>
      {% endif %}

      <form method="post" action="/login">
        <div class="field">
          <label for="email">Email</label>
          <input id="email" type="email" name="email" placeholder="you@ddsbstudent.ca" required>
        </div>
        <div class="field">
          <label for="password">Password</label>
          <input id="password" type="password" name="password" placeholder="••••••••" required>
        </div>
        <button class="submit-btn" type="submit">Log In</button>
      </form>

      <p class="hint">Need access? Contact your teacher organizer.</p>
    </section>
  </main>

  <script>
    function applyTheme(theme) {
      document.documentElement.setAttribute('data-theme', theme);
      document.getElementById('themeBtn').textContent = theme === 'dark' ? '☀️' : '🌙';
      localStorage.setItem('prom-theme', theme);
    }

    function toggleTheme() {
      const current = document.documentElement.getAttribute('data-theme');
      applyTheme(current === 'dark' ? 'light' : 'dark');
    }

    applyTheme(localStorage.getItem('prom-theme') || 'dark');
  </script>
</body>
</html>
